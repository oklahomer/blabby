syntax = "proto3";
package common;

option go_package = "github.com/oklahomer/blabby/gen/common;commonpb";

// ErrorDetail is the canonical business-error carrier for grain RPC
// responses. Every grain response that can fail with a domain outcome
// embeds an `ErrorDetail` field; presence of that field is itself the
// success/failure signal — nil means success, populated means failure.
//
// The numeric `code` and the `status` string come from the project's
// error taxonomy; the `message` is a short human-readable description
// safe to surface to clients (no actor paths, no internal details).
//
// Code ranges:
//   1000-1999  Authentication
//   2000-2999  Room / Membership
//   3000-3999  Rate Limiting
//   4000-4999  Validation
//   5000-5999  System / Internal
//
// See ADR-013 for why business failures travel as response values
// instead of through gRPC's status model.
message ErrorDetail {
  int32 code = 1;
  string status = 2;
  string message = 3;
}

// UserRef is a denormalized snapshot of a user's public reference metadata as it
// appears in a room event or message: the internal `id` plus the client-facing
// fields. It travels with join/message/event payloads so a recipient can label
// "who" without a separate lookup, and is cached by the Room grain so fan-out
// never blocks on a per-member query.
//
// `id` is the internal decimal Snowflake string; `public_code` is the bare
// canonical user code (the gateway prefixes it `U…` for clients). `status` and
// `metadata_version` are reference metadata; a receiver applies a snapshot only
// when `metadata_version` is newer.
message UserRef {
  string id = 1;
  string name = 2;
  string public_code = 3;
  string status = 4;
  int64 metadata_version = 5;
}

// RoomRef is the room counterpart of UserRef: a denormalized snapshot of a room's
// reference metadata. `room_id` is the internal decimal Snowflake string;
// `public_code` is the bare canonical room code (the gateway prefixes it `R…`).
message RoomRef {
  string room_id = 1;
  string public_code = 2;
  string name = 3;
  string status = 4;
  int64 metadata_version = 5;
}

// MembershipRef is the room-centric view of one membership: the member (UserRef)
// plus their relationship metadata. It carries no room id — the owning Room grain
// already knows the room.
message MembershipRef {
  UserRef user = 1;
  string role = 2;
  int64 joined_at_unix_millis = 3;
  int64 metadata_version = 4;
}

// JoinedRoomRef is the user-centric mirror of MembershipRef: the joined room
// (RoomRef) plus the relationship metadata, as cached by the User grain.
message JoinedRoomRef {
  RoomRef room = 1;
  string role = 2;
  int64 joined_at_unix_millis = 3;
  int64 metadata_version = 4;
}
