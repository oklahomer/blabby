syntax = "proto3";
package user;

import "common/common.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/oklahomer/blabby/gen/user;userpb";

// --- Connection Lifecycle ---

// PID identifies a protoactor PID by its address and id. Both fields are
// required and must be set together — a PID with only one half is invalid.
//
// Callers populate this from `ctx.Self()` (or another known actor PID).
// Receivers MUST NOT derive PIDs from `ctx.Sender()` on cluster RPCs,
// because cluster requests arrive on a transient future PID rather than
// the calling actor. See ADR-011 for the full rationale.
message PID {
  string address = 1;
  string id = 2;
}

// RegisterConnectionRequest registers a UserConnection actor with the User grain.
//
// The User grain stores the supplied PID and watches it; deregistration is
// implicit via protoactor's Terminated signal when the actor stops, so this
// service intentionally has no Deregister RPC. See ADR-012.
//
// requester_pid identifies the calling actor's persistent PID. It MUST be
// set by the caller (typically from `ctx.Self()`) — the User grain cannot
// derive it from `ctx.Sender()`, because a cluster RPC arrives on a
// transient future PID, not the calling actor. See ADR-011.
message RegisterConnectionRequest {
  PID requester_pid = 1;
}

// RegisterConnectionResponse indicates whether the connection was registered.
// A nil error indicates success; a populated error indicates failure. See ADR-013.
message RegisterConnectionResponse {
  common.ErrorDetail error = 1;
}

// --- Command Routing (gateway commands routed to Room grain) ---

// JoinRoomRequest routes a room join command through the User grain.
message JoinRoomRequest {
  string room_id = 1;
}

// JoinRoomResponse indicates the result of the join command.
// A nil error indicates success; a populated error indicates failure. See ADR-013.
message JoinRoomResponse {
  common.ErrorDetail error = 1;
}

// LeaveRoomRequest routes a room leave command through the User grain.
message LeaveRoomRequest {
  string room_id = 1;
}

// LeaveRoomResponse indicates the result of the leave command.
// A nil error indicates success; a populated error indicates failure. See ADR-013.
message LeaveRoomResponse {
  common.ErrorDetail error = 1;
}

// SendMessageRequest routes a message send command through the User grain.
message SendMessageRequest {
  string room_id = 1;
  string text = 2;
}

// SendMessageResponse indicates the result of the send command.
// A nil error indicates success; a populated error indicates failure.
// `timestamp` is the server-assigned timestamp on success and nil on failure.
// See ADR-013.
message SendMessageResponse {
  google.protobuf.Timestamp timestamp = 1;
  common.ErrorDetail error = 2;
}

// --- Event Delivery (Room grain fan-out to User's connections) ---

// ForwardMessageRequest delivers a chat message to the User grain for fan-out.
// `room` carries the originating room's reference metadata so the connection
// renders its public R… code without a lookup; `sender` carries the message
// author's id and display name.
message ForwardMessageRequest {
  common.RoomRef room = 1;
  common.UserRef sender = 2;
  string text = 3;
  google.protobuf.Timestamp timestamp = 4;
}

// ForwardMessageResponse acknowledges the message delivery. The User grain
// performs best-effort fan-out and never reports a business failure here;
// a nil response (with no transport error) means the request was accepted.
message ForwardMessageResponse {}

// RoomEventType enumerates the types of room membership events.
enum RoomEventType {
  ROOM_EVENT_TYPE_UNSPECIFIED = 0;
  ROOM_EVENT_TYPE_JOINED = 1;
  ROOM_EVENT_TYPE_LEFT = 2;
}

// NotifyRoomEventRequest delivers a room event (join/leave) to the User grain.
// `room` carries the originating room's reference metadata so the connection
// renders its public R… code without a lookup; `user` carries the subject's id
// and display name. `event_id` and `timestamp` identify the durable membership
// event this notification derives from.
message NotifyRoomEventRequest {
  common.RoomRef room = 1;
  common.UserRef user = 2;
  RoomEventType event_type = 3;
  // event_id is the decimal Snowflake id of the member_joined/member_left event
  // appended to the room timeline for this transition. It crosses the wire as a
  // decimal string — the documented exception to never exposing internal numeric
  // ids — so a consumer can correlate the fan-out with the timeline.
  string event_id = 4;
  // timestamp is the event's server-assigned occurred_at.
  google.protobuf.Timestamp timestamp = 5;
}

// NotifyRoomEventResponse acknowledges the event notification. Same semantics
// as ForwardMessageResponse — best-effort fan-out, no business failure.
message NotifyRoomEventResponse {}

// --- Queries ---

// GetJoinedRoomsRequest queries which rooms the user has joined.
message GetJoinedRoomsRequest {}

// GetJoinedRoomsResponse returns the user's joined rooms as reference metadata
// (public code, display name, status) so the gateway renders them without a
// per-request room lookup.
message GetJoinedRoomsResponse {
  repeated common.RoomRef rooms = 1;
}

// UserGrain defines the User virtual actor service.
service UserGrain {
  // Connection lifecycle. Deregistration is implicit via Watch; no
  // Deregister RPC. See ADR-012.
  rpc RegisterConnection(RegisterConnectionRequest) returns (RegisterConnectionResponse);

  // Command routing
  rpc JoinRoom(JoinRoomRequest) returns (JoinRoomResponse);
  rpc LeaveRoom(LeaveRoomRequest) returns (LeaveRoomResponse);
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);

  // Event delivery
  rpc ForwardMessage(ForwardMessageRequest) returns (ForwardMessageResponse);
  rpc NotifyRoomEvent(NotifyRoomEventRequest) returns (NotifyRoomEventResponse);

  // Queries
  rpc GetJoinedRooms(GetJoinedRoomsRequest) returns (GetJoinedRoomsResponse);
}
