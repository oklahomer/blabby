syntax = "proto3";
package room;

import "common/common.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/oklahomer/blabby/gen/room;roompb";

// JoinRequest is sent when a user wants to join a room. `user` carries the
// joiner's id and display name; the Room grain caches the name for fan-out.
message JoinRequest {
  common.UserRef user = 1;
}

// JoinResponse indicates whether the join operation succeeded.
// A nil error indicates success; a populated error indicates failure. See ADR-013.
message JoinResponse {
  common.ErrorDetail error = 1;
}

// LeaveRequest is sent when a user wants to leave a room.
message LeaveRequest {
  string user_id = 1;
}

// LeaveResponse indicates whether the leave operation succeeded.
// A nil error indicates success; a populated error indicates failure. See ADR-013.
message LeaveResponse {
  common.ErrorDetail error = 1;
}

// PostMessageRequest is sent when a user posts a message to a room. `user`
// carries the sender's id and display name.
message PostMessageRequest {
  common.UserRef user = 1;
  string text = 2;
}

// PostMessageResponse indicates whether the message was posted.
// A nil error indicates success; a populated error indicates failure.
// `timestamp` is the server-assigned timestamp on success and nil on
// failure. See ADR-013.
message PostMessageResponse {
  google.protobuf.Timestamp timestamp = 1;
  common.ErrorDetail error = 2;
}

// RoomGrain defines the Room virtual actor service.
service RoomGrain {
  rpc Join(JoinRequest) returns (JoinResponse);
  rpc Leave(LeaveRequest) returns (LeaveResponse);
  rpc PostMessage(PostMessageRequest) returns (PostMessageResponse);
}
