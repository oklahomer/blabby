syntax = "proto3";
package room;

import "common/common.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/oklahomer/blabby/gen/room;roompb";

// JoinRequest is sent when a user wants to join a room. `user` carries the
// joiner's id and display name; the Room grain caches the name for fan-out.
message JoinRequest {
  common.UserRef user = 1;
}

// JoinResponse indicates whether the join operation succeeded.
// A nil error indicates success; a populated error indicates failure. See ADR-013.
//
// `room` is the Room grain's cached reference metadata. It is present whenever the
// grain is loaded — including the already-member outcome — so the caller can cache
// the room's public code and display name without a separate lookup. It is absent
// only when the room itself is absent (ROOM_NOT_FOUND).
message JoinResponse {
  common.ErrorDetail error = 1;
  common.RoomRef room = 2;
}

// LeaveRequest is sent when a user wants to leave a room.
message LeaveRequest {
  string user_id = 1;
}

// LeaveResponse indicates whether the leave operation succeeded.
// A nil error indicates success; a populated error indicates failure. See ADR-013.
message LeaveResponse {
  common.ErrorDetail error = 1;
}

// PostMessageRequest is sent when a user posts a message to a room. `user`
// carries the sender's id and display name.
message PostMessageRequest {
  common.UserRef user = 1;
  string text = 2;
}

// PostMessageResponse indicates whether the message was posted.
// A nil error indicates success; a populated error indicates failure.
// `timestamp` is the server-assigned timestamp on success and nil on
// failure. See ADR-013.
message PostMessageResponse {
  google.protobuf.Timestamp timestamp = 1;
  common.ErrorDetail error = 2;
}

// SetMemberRoleRequest changes another member's role. `actor` carries the acting
// member's server-resolved identity (attached by the User grain, never
// client-supplied). `target_user_id` is the internal numeric id of the member
// whose role changes. `role` is the new role label — "admin" or "member"; the
// owner role never moves through a role change (see TransferOwnership).
message SetMemberRoleRequest {
  common.UserRef actor = 1;
  string target_user_id = 2;
  string role = 3;
}

// SetMemberRoleResponse indicates whether the role change was applied.
// A nil error indicates success; a populated error indicates failure. See ADR-013.
message SetMemberRoleResponse {
  common.ErrorDetail error = 1;
}

// TransferOwnershipRequest hands the room to another member: the current owner
// (`actor`) is demoted to admin and `new_owner_user_id` becomes the owner. Only
// the owner may transfer.
message TransferOwnershipRequest {
  common.UserRef actor = 1;
  string new_owner_user_id = 2;
}

// TransferOwnershipResponse indicates whether ownership moved. A nil error
// indicates success, including the no-op transfer to the current owner. See
// ADR-013.
message TransferOwnershipResponse {
  common.ErrorDetail error = 1;
}

// RoomGrain defines the Room virtual actor service.
service RoomGrain {
  rpc Join(JoinRequest) returns (JoinResponse);
  rpc Leave(LeaveRequest) returns (LeaveResponse);
  rpc PostMessage(PostMessageRequest) returns (PostMessageResponse);

  // Role management. New RPCs append after the originals so the generated
  // method indexes of the existing calls never shift.
  rpc SetMemberRole(SetMemberRoleRequest) returns (SetMemberRoleResponse);
  rpc TransferOwnership(TransferOwnershipRequest) returns (TransferOwnershipResponse);
}
