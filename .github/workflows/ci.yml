name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Buf lint
        run: buf lint

      - name: Install protoc-gen-go-grain
        run: go install github.com/asynkron/protoactor-go/protobuf/protoc-gen-go-grain@v0.0.0-20260118094027-288962e52f3f

      - name: Buf generate and diff check
        run: |
          buf generate
          git diff --exit-code gen/

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          install-only: true

      - name: Lint
        run: make lint

      - name: Spec lint
        run: make spec-lint

      - name: Test
        run: make test

      - name: Build
        run: make build
