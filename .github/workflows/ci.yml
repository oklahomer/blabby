name: CI

# push is filtered to main so a feature branch with an open PR builds once
# (via pull_request, on the merge ref) instead of twice; merges to main and
# direct pushes to main still build via push. A branch pushed before its PR
# exists builds when the PR opens — pull_request fires on the current head.
on:
  push:
    branches: [main]
  pull_request:

# Nothing in this workflow pushes or writes to the repository, so the
# baseline token grant is read-only; the ci job widens its own copy with
# checks: write, which goveralls needs.
permissions:
  contents: read

jobs:
  # Verifies every committed .svg matches a fresh render of its .puml source
  # and that no .svg outlives its source, catching a hand-edited .svg, a
  # render the PlantUML workflow missed, or a leftover from a deleted or
  # renamed diagram. Expected transient failure: a push that changes a .puml
  # runs this job before the Render PlantUML workflow lands its bot commit.
  # With the bot App configured (see plantuml.yml), the bot commit re-triggers
  # CI and this job passes on the repaired head; on the GITHUB_TOKEN fallback
  # (e.g. forks), GitHub starts no runs for the bot's push, so re-run CI
  # manually after the bot commit lands. The image tag comes from the
  # Makefile so this check renders with the same pinned version as the bot.
  diagrams:
    runs-on: ubuntu-latest
    steps:
      # persist-credentials: false — no step here pushes, and the PlantUML
      # container mounts the workspace, so no token should sit in .git/config.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify no SVG outlives its .puml source
        run: |
          failed=0
          for svg in $(git ls-files '*.svg'); do
            if [ ! -f "${svg%.svg}.puml" ]; then
              echo "::error file=$svg::$svg has no matching ${svg%.svg}.puml source; delete it or restore the source"
              failed=1
            fi
          done
          exit $failed

      - name: Verify committed SVGs match their .puml sources
        run: |
          files=$(git ls-files '*.puml')
          if [ -z "$files" ]; then
            echo "No .puml files tracked; nothing to verify."
            exit 0
          fi
          image=$(sed -n 's/^PLANTUML_IMAGE *= *//p' Makefile)
          docker run --rm -v "$PWD:/data" "$image" -tsvg $files
          git add -A -- '*.svg'
          git diff --cached --exit-code -- '*.svg'

  ci:
    runs-on: ubuntu-latest
    # Job-level permissions replace the workflow-level set, so contents: read
    # is restated here. goveralls publishes the coverage result as a check
    # run via github.token, which requires checks: write
    # (github.com/shogo82148/actions-goveralls/issues/342).
    permissions:
      contents: read
      checks: write
    # Postgres with PGroonga, mirroring docker-compose, so the database-gated
    # integration tests (persistence repos + the multi-member membership-durability
    # test) run in CI rather than being skipped. The schema is applied by a step
    # below, since a service container cannot mount an init script.
    services:
      postgres:
        # The digest freezes what the mutable tag pointed at when pinned;
        # bump both together (docker-compose keeps the bare tag for local dev).
        image: groonga/pgroonga:4.0.6-alpine-17@sha256:71665e330db82bb162a021c34d9ccf4bc933505bd78c65f8770eddbeaee8b3ab
        env:
          POSTGRES_USER: blabby
          POSTGRES_PASSWORD: blabby
          POSTGRES_DB: blabby
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blabby -d blabby"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      BLABBY_DATABASE_URL: postgres://blabby:blabby@localhost:5432/blabby?sslmode=disable
    steps:
      # persist-credentials: false — no step in this job pushes.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # go-version-file honors go.mod's toolchain directive, so CI runs the
      # exact patched toolchain the module pins. setup-go exports
      # GOTOOLCHAIN=local, which would otherwise ignore the pin (a bare
      # "1.26" resolved to an older patch release and the vulnerability
      # gate correctly failed on an already-fixed stdlib CVE).
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0

      - name: Buf lint
        run: buf lint

      - name: Install protoc-gen-go-grain
        run: go install github.com/asynkron/protoactor-go/protobuf/protoc-gen-go-grain@v0.0.0-20260118094027-288962e52f3f

      - name: Buf generate and diff check
        run: |
          buf generate
          git diff --exit-code gen/

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          install-only: true

      - name: Lint
        run: make lint

      - name: Spec lint
        run: make spec-lint

      # Blocking: govulncheck reports only vulnerabilities the code actually
      # reaches, so a finding is a real call path into a vulnerable function.
      # Fix it by bumping the module (or the toolchain for stdlib findings).
      # The tool version is pinned for reproducible runs; the vulnerability
      # database it queries updates independently of the pin.
      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

      # Non-blocking: gosec's heuristics flag known-benign spots (env-var
      # names and the login DTO matching credential patterns, the local
      # docs-preview tool's subprocess/file use), so findings surface in the
      # step log without failing the build. Generated code is excluded.
      - name: Static security scan (informational)
        continue-on-error: true
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
          gosec -exclude-dir=gen ./...

      - name: Load database schema
        run: psql "$BLABBY_DATABASE_URL" -f internal/persistence/schema.sql

      - name: Test
        run: make test

      # Separate from the -race gate above: make coverage measures the headline
      # scope (./internal/...) without -race. The schema is already loaded and
      # BLABBY_DATABASE_URL is set, so the persistence integration tests count
      # toward the number reported to Coveralls.
      - name: Coverage
        run: make coverage

      - name: Report coverage to Coveralls
        uses: shogo82148/actions-goveralls@9606dbc5ac5cf888a0e9ef901515c3cd516a2790 # v1.11.0
        with:
          path-to-profile: coverage.out

      - name: Build
        run: make build
