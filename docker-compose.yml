services:
  # Grain tier: a cluster member hosting the User and Room grains.
  backend:
    build: .
    image: blabby
    command:
      - /blabby-backend
      - "--cluster-host=0.0.0.0"
      - "--cluster-port=8090"
      - "--discovery-port=6330"
      - "--advertised-host=backend:8090"
      - "--seeds=backend:6330"
    environment:
      BLABBY_DATABASE_URL: "postgres://${POSTGRES_USER:-blabby}:${POSTGRES_PASSWORD:-blabby}@postgres:5432/${POSTGRES_DB:-blabby}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  # API tier: a cluster client serving HTTP/WebSocket. Advertised hosts are the
  # compose service names (reachable on the compose network), not loopback, so
  # the backend can reach this gateway's UserConnection PIDs for fan-out.
  gateway:
    image: blabby
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      BLABBY_DATABASE_URL: "postgres://${POSTGRES_USER:-blabby}:${POSTGRES_PASSWORD:-blabby}@postgres:5432/${POSTGRES_DB:-blabby}?sslmode=disable"
    command:
      - /blabby-gateway
      - "--listen=0.0.0.0:8080"
      - "--cluster-host=0.0.0.0"
      - "--cluster-port=8091"
      - "--discovery-port=6331"
      - "--advertised-host=gateway:8091"
      - "--seeds=backend:6330"
    ports:
      - "${SERVER_PORT:-8080}:8080"

  # Persistent storage: PostgreSQL with the PGroonga extension for CJK-aware
  # full-text search. The backend and gateway connect to it via
  # BLABBY_DATABASE_URL and wait for its healthcheck before starting. On a fresh
  # volume the entrypoint runs the mounted schema.sql (which creates the PGroonga
  # extension and applies the dev seed); use `make db-reset` to re-provision after
  # editing the schema.
  postgres:
    image: groonga/pgroonga:4.0.6-alpine-17
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-blabby}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-blabby}"
      POSTGRES_DB: "${POSTGRES_DB:-blabby}"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./internal/persistence/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blabby} -d ${POSTGRES_DB:-blabby}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
