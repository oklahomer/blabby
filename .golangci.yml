version: "2"

run:
  go: "1.26"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - revive
    - gocritic
    - misspell
  settings:
    revive:
      rules:
        - name: package-comments
          disabled: true
  exclusions:
    paths:
      - gen/

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - gen/
