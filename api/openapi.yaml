openapi: 3.1.0
info:
  title: blabby HTTP API
  version: 0.1.0
  description: |
    The HTTP API for blabby, a real-time chat service.

    Clients use HTTP for commands and queries (login, room discovery, membership,
    and sending messages) and a WebSocket for the live event stream. The WebSocket
    message contract is documented separately in `asyncapi.yaml`.

    ## Authentication

    Every endpoint requires an `Authorization: Bearer <jwt>` header **except**:

    - `POST /users`, `POST /users/verifications`, and
      `POST /users/verifications/resend` — the pre-login registration flow,
    - `POST /login`, which mints the token and is therefore public, and
    - `GET /ws`, where authentication is the first WebSocket frame after the
      upgrade rather than an HTTP header.

    A missing or malformed bearer header is rejected with `401 AUTH_MISSING_TOKEN`,
    an expired token with `401 AUTH_EXPIRED_TOKEN`, and any other invalid token
    with `401 AUTH_INVALID_TOKEN`.

    ## Error envelope

    Every application-generated JSON error response shares one envelope: a top-level
    `error` object holding a numeric `code`, a canonical `status` string, and a
    human-readable, client-safe `message`. A failed WebSocket upgrade is emitted by
    the WebSocket library as plain text instead. The `status` enum on `ErrorDetail`
    lists the full error taxonomy; each operation's `responses` section is the
    authoritative list of what that operation can actually return.
servers:
  - url: http://localhost:8080
    description: Default local gateway address.
security:
  - bearerAuth: []
tags:
  - name: Registration
    description: Account creation and email-PIN verification.
  - name: Authentication
    description: Token issuance.
  - name: WebSocket
    description: The live event-stream upgrade handshake.
  - name: Rooms
    description: Room discovery, membership, and messaging.
paths:
  /users:
    post:
      operationId: registerUser
      tags:
        - Registration
      summary: Register a new account.
      description: |
        Creates a pending account and emails it a 6-digit verification PIN. The
        account cannot log in until the PIN is confirmed via
        `POST /users/verifications`. This endpoint is public.

        Re-registering an address that is already pending does not modify the
        stored account: it re-issues a fresh PIN (rate-limited) and returns the
        existing account's `public_code`. An address or handle owned by an
        active account is rejected with `409`.

        The request body is capped at 1 MB.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              mail_address: dana@example.com
              handle: Dana_99
              password: a-long-passphrase
      responses:
        '201':
          description: |
            The account exists in `pending` status and a verification PIN was
            dispatched. The body carries the account's public code (`U…`) — the
            identity that appears as the JWT subject once verified and logged in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              example:
                public_code: UA1B2C3D4E5
        '400':
          description: |
            The request body was malformed or not `application/json`, or a
            field failed validation: a missing field or malformed handle is
            `INVALID_REQUEST`, a value that does not parse as a bare email
            address is `INVALID_EMAIL`, and a password shorter than 12 bytes
            is `WEAK_PASSWORD`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4005
                  status: WEAK_PASSWORD
                  message: password is too short
        '409':
          description: |
            The email address (`EMAIL_ALREADY_REGISTERED`) or handle
            (`HANDLE_ALREADY_TAKEN`) is already owned by another account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 6001
                  status: EMAIL_ALREADY_REGISTERED
                  message: email already registered
        '413':
          description: The request body exceeded the 1 MB limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4003
                  status: PAYLOAD_TOO_LARGE
                  message: request body exceeds maximum size
        '429':
          $ref: '#/components/responses/VerificationRateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /users/verifications:
    post:
      operationId: verifyRegistration
      tags:
        - Registration
      summary: Activate a pending account with its emailed PIN.
      description: |
        Confirms a pending account by checking the submitted PIN against its
        challenge. On success the account becomes `active` — it can now log in —
        and the challenge is cleared. This endpoint is public.

        Failure is deliberately uniform: an unknown or non-pending address, a
        missing or expired challenge, a wrong PIN, and a challenge locked by too
        many wrong attempts (5) all return the same `400 VERIFICATION_INVALID`,
        so the response reveals nothing about which precondition failed. A
        locked challenge is recovered by requesting a fresh PIN via
        `POST /users/verifications/resend`, which resets the attempt count.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRequest'
            example:
              mail_address: dana@example.com
              pin: '482910'
      responses:
        '200':
          description: The account is now active and can log in. The response has no body.
        '400':
          description: |
            The request was malformed or not `application/json`
            (`INVALID_REQUEST`), the email did not parse (`INVALID_EMAIL`), or
            the verification could not succeed (`VERIFICATION_INVALID` — the
            uniform failure described above).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 6003
                  status: VERIFICATION_INVALID
                  message: verification failed
        '413':
          description: The request body exceeded the 1 MB limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4003
                  status: PAYLOAD_TOO_LARGE
                  message: request body exceeds maximum size
        '500':
          $ref: '#/components/responses/InternalError'
  /users/verifications/resend:
    post:
      operationId: resendVerificationPIN
      tags:
        - Registration
      summary: Re-issue a verification PIN to a pending account.
      description: |
        Sends a fresh PIN to a pending account, replacing the previous challenge
        and resetting its attempt count. This endpoint is public.

        To avoid revealing which addresses are registered, an unknown or
        already-active address is a silent no-op that still returns `200`. Only
        a pending account that has exhausted its resend budget returns `429`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
            example:
              mail_address: dana@example.com
      responses:
        '200':
          description: |
            A fresh PIN was sent — or the address was unknown or already active
            and nothing happened; the two outcomes are indistinguishable by
            design. The response has no body.
        '400':
          description: |
            The request body was malformed or not `application/json`
            (`INVALID_REQUEST`), or the email did not parse (`INVALID_EMAIL`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4004
                  status: INVALID_EMAIL
                  message: mail address is not a valid email
        '413':
          description: The request body exceeded the 1 MB limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4003
                  status: PAYLOAD_TOO_LARGE
                  message: request body exceeds maximum size
        '429':
          $ref: '#/components/responses/VerificationRateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /login:
    post:
      operationId: login
      tags:
        - Authentication
      summary: Exchange credentials for a bearer token.
      description: |
        Authenticates a mail-address/password pair and returns a JWT bearer
        token to be sent on every other endpoint. This endpoint is public.

        All authentication failures return the same `401 AUTH_INVALID_TOKEN`
        response regardless of whether the mail address or the password was
        wrong, so the response cannot be used to enumerate accounts.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              mail_address: alice@example.com
              password: alice123
      responses:
        '200':
          description: Authentication succeeded; the body carries the bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: |
            The request body was malformed, empty, carried trailing data, was
            not `application/json`, or the mail address/password exceeded the
            field size limits (mail address 254 bytes, password 256 bytes).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4001
                  status: INVALID_REQUEST
                  message: mail address and password are required
        '401':
          description: |
            The login was refused. Every credential failure — unknown address,
            wrong password, disabled account — is the uniform
            `AUTH_INVALID_TOKEN`, so the response cannot be used to enumerate
            accounts. The one distinguished case is `AUTH_ACCOUNT_PENDING`: the
            password was correct but the account has not completed email
            verification (safe to reveal, since the caller proved ownership);
            finish verification via `POST /users/verifications`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 1001
                  status: AUTH_INVALID_TOKEN
                  message: invalid credentials
        '413':
          description: The request body exceeded the 1 MB limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4003
                  status: PAYLOAD_TOO_LARGE
                  message: request body exceeds maximum size
        '500':
          $ref: '#/components/responses/InternalError'
  /ws:
    get:
      operationId: connectWebSocket
      tags:
        - WebSocket
      summary: Upgrade the connection to the chat WebSocket.
      description: |
        Performs the WebSocket upgrade handshake. This endpoint is **not** guarded
        by the bearer middleware: after the upgrade the client authenticates by
        sending an `auth` frame as its first message.

        The frame-level message contract — inbound `auth`/`pong` and outbound
        `auth_ok`/`auth_error`/`message`/`joined`/`left`/`error`/`ping` — is
        documented in `asyncapi.yaml`.
      security: []
      responses:
        '101':
          description: |
            Switching Protocols. The connection is now a WebSocket; all further
            communication follows the frame contract in `asyncapi.yaml`.
        '400':
          description: The request was not a valid WebSocket upgrade handshake.
          content:
            text/plain:
              schema:
                type: string
  /rooms:
    get:
      operationId: listRooms
      tags:
        - Rooms
      summary: List the available rooms.
      description: |
        Returns one page of the catalogue of rooms a client can join, in
        creation order. `q` narrows the page to rooms whose display name
        contains the fragment (case-insensitive, literal — no wildcard
        syntax). Pages continue by echoing the response's `next` cursor back
        as `after`; a `null` `next` means the listing is exhausted.
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            x-max-utf8-bytes: 64
          description: |
            A display-name search fragment, following the same character rules
            as room names: 1-64 bytes of printable characters, NFC-normalized
            like the stored names it searches. A blank value is treated as
            absent.
        - name: after
          in: query
          required: false
          schema:
            type: string
          description: |
            The keyset cursor: the `R…` id of the last room on the previous
            page, as returned in `next`. Only rooms created after it are
            listed. A cursor that matches no active room is rejected with a
            400; restart from the first page.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: The page size.
      responses:
        '200':
          description: One page of the room catalogue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomCataloguePage'
              example:
                rooms:
                  - id: RG000000004
                    name: General
                  - id: RH000000005
                    name: Random
                next: null
        '400':
          description: |
            `q` was not a valid name fragment, `after` was malformed or matched
            no active room, or `limit` was not an integer between 1 and 200.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4001
                  status: INVALID_REQUEST
                  message: after references an unknown room
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      operationId: createRoom
      tags:
        - Rooms
      summary: Create a room.
      description: |
        Creates an active room owned by the authenticated caller: the room, the
        caller's owner membership, and the founding `member_joined` timeline
        event commit together, so the room's timeline explains its owner like
        any later member. The new room appears in the caller's
        `GET /rooms/joined` immediately. Room names are display labels — not
        unique, any printable characters — and the returned `R…` code is the
        room's identity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
            example:
              name: Team Standup
      responses:
        '201':
          description: The room exists; the body carries its descriptor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDescriptor'
              example:
                id: RK000000042
                name: Team Standup
        '400':
          description: |
            The body was malformed, or `name` was missing, blank, longer than
            64 bytes, or contained control or invisible formatting characters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4001
                  status: INVALID_REQUEST
                  message: name must be 1-64 bytes of printable characters
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: The request body exceeded the 1 KiB limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4003
                  status: PAYLOAD_TOO_LARGE
                  message: request body exceeds maximum size
        '500':
          $ref: '#/components/responses/InternalError'
  /rooms/joined:
    get:
      operationId: listJoinedRooms
      tags:
        - Rooms
      summary: List the rooms the caller has joined.
      description: |
        Returns the rooms the authenticated user is currently a member of, as
        descriptors (opaque `R…` id + name) — the same shape as the catalogue. When
        the user has joined no rooms, the `rooms` array is `[]`, never `null`.
      responses:
        '200':
          description: The caller's joined rooms.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomListResponse'
              example:
                rooms:
                  - id: RG000000004
                    name: General
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /rooms/{id}/events:
    parameters:
      - $ref: '#/components/parameters/RoomId'
    get:
      operationId: listRoomEvents
      tags:
        - Rooms
      summary: Read a page of the room's timeline.
      description: |
        Returns one newest-first page of the room's durable timeline — chat
        messages and `member_joined`/`member_left` system events interleaved
        in id order. The caller must be a current member. `q` narrows the page
        to messages whose text contains every whitespace-separated term of the
        fragment (full-text, CJK-aware; terms match literally — no query
        syntax). Older pages continue by echoing the response's `next` cursor
        back as `before`; a `null` `next` means the history is exhausted.
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            x-max-utf8-bytes: 256
          description: |
            A message-text search fragment: 1-256 bytes of valid UTF-8,
            canonicalized (NFC, LF newlines) and following the same character
            rules as message text (control characters other than newline and
            tab are rejected). Every whitespace-separated term must appear in
            the message. When set, only `message` events are returned. A
            blank value is treated as absent.
        - name: before
          in: query
          required: false
          schema:
            type: string
          description: |
            The keyset cursor: the event id of the last entry on the previous
            page, as returned in `next`. Only older events are listed. A blank
            value is treated as absent.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: The page size.
      responses:
        '200':
          description: One page of the room timeline.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomEventsPage'
              example:
                events:
                  - id: '112233445566778899'
                    type: message
                    sender:
                      id: UA000000001
                      name: alice
                    text: hello, world
                    timestamp: 1718280000000
                  - id: '112233445566778898'
                    type: member_joined
                    user:
                      id: UA000000001
                      name: alice
                    timestamp: 1718279000000
                next: null
        '400':
          description: |
            The room identifier was invalid, `q` was not a valid search
            fragment, `before` was not a valid event id, or `limit` was not an
            integer between 1 and 200.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4001
                  status: INVALID_REQUEST
                  message: before is not a valid event id
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: The caller is not a member of the room.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 2001
                  status: ROOM_NOT_MEMBER
                  message: not a member of this room
        '404':
          $ref: '#/components/responses/RoomNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /rooms/{id}/membership:
    parameters:
      - $ref: '#/components/parameters/RoomId'
    put:
      operationId: ensureRoomMembership
      tags:
        - Rooms
      summary: Ensure the caller is a member of the room.
      description: |
        Idempotently makes the authenticated user a member of the room. Membership
        is modelled as a REST resource, so this operation is safe to repeat: if the
        caller is already a member the call still returns `200`, never a conflict.
      responses:
        '200':
          description: The caller is a member of the room.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
        '400':
          $ref: '#/components/responses/InvalidRoomId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/RoomNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      operationId: removeRoomMembership
      tags:
        - Rooms
      summary: Ensure the caller is not a member of the room.
      description: |
        Idempotently removes the authenticated user from the room. Like the PUT,
        this is safe to repeat: if the caller is not a member the call still
        returns `200`, never an error. The one exception is the room's owner,
        who cannot leave until ownership is transferred
        (`PUT /rooms/{id}/owner`).
      responses:
        '200':
          description: The caller is not a member of the room.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
        '400':
          $ref: '#/components/responses/InvalidRoomId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/RoomNotFound'
        '409':
          description: |
            The caller owns the room. Transfer ownership first, then retry the
            leave.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 2004
                  status: ROOM_OWNER_CANNOT_LEAVE
                  message: transfer ownership before leaving the room
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /rooms/{id}/members/{user}/role:
    parameters:
      - $ref: '#/components/parameters/RoomId'
      - $ref: '#/components/parameters/UserCode'
    put:
      operationId: setRoomMemberRole
      tags:
        - Rooms
      summary: Set another member's role.
      description: |
        Changes the target member's role to `admin` or `member`. The caller must
        be a member whose role permits it — the owner or an admin; admins may
        promote members and demote admins alike. The owner role never moves
        through this endpoint: replacing the owner is `PUT /rooms/{id}/owner`.
        Setting a role the member already holds succeeds, so the PUT is safe to
        repeat.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRoleRequest'
            example:
              role: admin
      responses:
        '200':
          description: The member now holds the requested role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
        '400':
          description: |
            The room or user code was malformed, the user code matches no
            account, the body was malformed or missing `role`, or the role was
            not `admin`/`member`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4001
                  status: INVALID_REQUEST
                  message: role must be admin or member
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            The caller or the target is not a member (`ROOM_NOT_MEMBER`), or the
            caller's role does not permit the change (`ROOM_PERMISSION_DENIED`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 2005
                  status: ROOM_PERMISSION_DENIED
                  message: your role does not permit changing member roles
        '404':
          $ref: '#/components/responses/RoomNotFound'
        '413':
          description: The request body exceeded the 1 KiB limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4003
                  status: PAYLOAD_TOO_LARGE
                  message: request body exceeds maximum size
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /rooms/{id}/owner:
    parameters:
      - $ref: '#/components/parameters/RoomId'
    put:
      operationId: transferRoomOwnership
      tags:
        - Rooms
      summary: Transfer the room's ownership.
      description: |
        Hands the room to another member: the caller (who must be the current
        owner) is demoted to admin and the named member becomes the owner. The
        owner is modelled as a REST resource, so naming the current owner is an
        idempotent `200` no-op. An owner cannot leave a room
        (`409 ROOM_OWNER_CANNOT_LEAVE` on the membership DELETE) until they have
        transferred it here.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetOwnerRequest'
            example:
              user: UB000000002
      responses:
        '200':
          description: The named member owns the room.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
        '400':
          description: |
            The room code was malformed, the body was malformed or missing
            `user`, or the user code was malformed or matches no account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4001
                  status: INVALID_REQUEST
                  message: unknown user
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            The caller or the named member is not a member (`ROOM_NOT_MEMBER`),
            or the caller is not the owner (`ROOM_PERMISSION_DENIED`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 2005
                  status: ROOM_PERMISSION_DENIED
                  message: only the owner can transfer ownership
        '404':
          $ref: '#/components/responses/RoomNotFound'
        '413':
          description: The request body exceeded the 1 KiB limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4003
                  status: PAYLOAD_TOO_LARGE
                  message: request body exceeds maximum size
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /rooms/{id}/messages:
    parameters:
      - $ref: '#/components/parameters/RoomId'
    post:
      operationId: sendRoomMessage
      tags:
        - Rooms
      summary: Send a message to a room.
      description: |
        Posts a chat message to the room. The caller must already be a member.
        The message is fanned out to every member's WebSocket as a `message`
        frame (see `asyncapi.yaml`), including the sender's own connection.

        The request must use `Content-Type: application/json` (charset variants are
        accepted); the body is capped at 8 KiB and `text` at 4 KiB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
            example:
              text: hello, world
      responses:
        '200':
          description: The message was accepted for fan-out.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageSuccessResponse'
              example:
                success: true
                timestamp: 1718280000000
        '400':
          description: |
            The room identifier was invalid, the `Content-Type` was not JSON, or
            the body was malformed, empty, or carried trailing data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4001
                  status: INVALID_REQUEST
                  message: text is required
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: The caller is not a member of the room.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 2001
                  status: ROOM_NOT_MEMBER
                  message: not a member of this room
        '404':
          $ref: '#/components/responses/RoomNotFound'
        '413':
          description: The request body exceeded the 8 KiB limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 4003
                  status: PAYLOAD_TOO_LARGE
                  message: request body exceeds maximum size
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "A JWT issued by `POST /login`, sent as `Authorization: Bearer <jwt>`."
  parameters:
    RoomId:
      name: id
      in: path
      required: true
      description: |
        The opaque public room code: `R` followed by 10 Crockford Base32 symbols
        (e.g. `RG000000004`). Input is parsed leniently (case-insensitive, `O`→`0`,
        `I`/`L`→`1`). A malformed code is rejected with `400 INVALID_REQUEST`; a
        well-formed code that matches no active room is `404 ROOM_NOT_FOUND`. The
        internal numeric room id is never accepted here.
      schema:
        type: string
      example: RG000000004
    UserCode:
      name: user
      in: path
      required: true
      description: |
        The target member's opaque public user code: `U` followed by 10
        Crockford Base32 symbols (e.g. `UB000000002`). Parsed with the same
        leniency as room codes. A malformed or unknown code is rejected with
        `400 INVALID_REQUEST` — the codes are unguessable, and a nonexistent
        user is by definition not a member, so nothing is revealed that
        membership wouldn't.
      schema:
        type: string
      example: UB000000002
  schemas:
    RegisterRequest:
      type: object
      required:
        - mail_address
        - handle
        - password
      properties:
        mail_address:
          type: string
          format: email
          x-max-utf8-bytes: 254
          description: |
            The account's email address: a bare address in the server's ASCII
            subset of RFC 5321 — a dot-string local part (at most 64 bytes)
            and letter-digit-hyphen domain labels. Display names, quoted
            local parts, address literals, and internationalized (SMTPUTF8,
            U-label) forms are not supported; ASCII IDNA A-labels (xn--...)
            are. Normalized to lowercase. At most 254 bytes.
        handle:
          type: string
          minLength: 3
          maxLength: 30
          pattern: '^[A-Za-z0-9_]+$'
          description: |
            The account handle: 3–30 characters of letters, digits, or
            underscore. The submitted casing is kept for display; uniqueness is
            case-insensitive.
        password:
          type: string
          minLength: 1
          x-min-utf8-bytes: 12
          x-max-utf8-bytes: 256
          description: |
            The account password. The 12-byte minimum is measured on the
            NFC-normalized form (a byte count, not the character count JSON
            Schema minLength would express); the 256-byte cap applies to the
            submitted bytes (a transport cap). The server NFC-normalizes the
            password — and never trims it, so whitespace anywhere in it is
            significant — before hashing, so visually identical spellings are
            one credential.
    RegisterResponse:
      type: object
      required:
        - public_code
      properties:
        public_code:
          type: string
          description: |
            The account's opaque public code: `U` followed by 10 Crockford
            Base32 symbols. After verification and login it appears as the JWT
            subject.
    VerifyRequest:
      type: object
      required:
        - mail_address
        - pin
      properties:
        mail_address:
          type: string
          format: email
          x-max-utf8-bytes: 254
          description: The email address the account registered with.
        pin:
          type: string
          pattern: '^[0-9]{6}$'
          description: The 6-digit PIN from the verification email.
    ResendVerificationRequest:
      type: object
      required:
        - mail_address
      properties:
        mail_address:
          type: string
          format: email
          x-max-utf8-bytes: 254
          description: The email address the account registered with.
    LoginRequest:
      type: object
      required:
        - mail_address
        - password
      properties:
        mail_address:
          type: string
          format: email
          x-max-utf8-bytes: 254
          description: |
            The mail address the account registered with — the login identity.
            Bare ASCII form, at most 254 bytes.
        password:
          type: string
          minLength: 1
          x-max-utf8-bytes: 256
          description: |
            The account password. NFC-normalized — never trimmed, so
            whitespace anywhere in it is significant — before verification,
            matching registration. The 256-byte cap applies to the submitted
            bytes (a transport cap); only a truly empty password is treated
            as missing.
    LoginResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: The JWT bearer token to send on every authenticated endpoint.
    RoomListResponse:
      type: object
      required:
        - rooms
      properties:
        rooms:
          type: array
          description: The caller's joined rooms, as descriptors.
          items:
            $ref: '#/components/schemas/RoomDescriptor'
    RoomCataloguePage:
      type: object
      required:
        - rooms
        - next
      properties:
        rooms:
          type: array
          description: One page of the catalogue, as descriptors in creation order.
          items:
            $ref: '#/components/schemas/RoomDescriptor'
        next:
          type:
            - string
            - 'null'
          description: |
            The `after` value for the next page — the id of the last room in
            `rooms` — or `null` when the listing is exhausted.
    RoomDescriptor:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: |
            The opaque public room code (`R…`) used in path parameters and event
            frames. The internal numeric room id is never exposed.
        name:
          type: string
          description: The room's human-readable display name.
    RoomEventsPage:
      type: object
      required:
        - events
        - next
      properties:
        events:
          type: array
          description: One newest-first page of the room timeline.
          items:
            $ref: '#/components/schemas/RoomEvent'
        next:
          type:
            - string
            - 'null'
          description: |
            The `before` value for the next (older) page — the id of the last
            event in `events` — or `null` when the history is exhausted.
    RoomEvent:
      type: object
      required:
        - id
        - type
        - timestamp
      properties:
        id:
          type: string
          description: |
            The event's id as a decimal string — the timeline cursor. Ids are
            programmatic identifiers, never human-shared.
        type:
          type: string
          enum:
            - message
            - member_joined
            - member_left
          description: |
            The event kind. A `message` carries `sender` and `text`;
            `member_joined`/`member_left` carry `user` — mirroring the
            WebSocket frames' vocabulary for people.
        sender:
          $ref: '#/components/schemas/EventPerson'
          description: The message's author. Present on `message` events only.
        user:
          $ref: '#/components/schemas/EventPerson'
          description: |
            The member who joined or left. Present on `member_joined` and
            `member_left` events only.
        text:
          type: string
          description: The message body. Present on `message` events only.
        timestamp:
          type: integer
          format: int64
          description: The event's server-assigned time in unix milliseconds.
    EventPerson:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: |
            The person's opaque public user code (`U…`). The internal numeric
            user id is never exposed.
        name:
          type: string
          description: The person's current display name.
    SendMessageRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          pattern: '\S'
          x-max-utf8-bytes: 4096
          description: |
            The message body. Required and non-blank. The server stores and
            delivers a canonical form: line endings (CRLF or lone CR) become
            LF, Unicode is NFC-normalized, and surrounding whitespace is
            trimmed; the 4 KiB cap applies to that canonical form. Control
            characters other than newline and tab, and explicit bidi
            override/isolate characters, are rejected.
    CreateRoomRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          x-max-utf8-bytes: 64
          description: |
            The room's display name: NFC-normalized, trimmed, non-blank, at
            most 64 bytes of printable characters (spaces included; control
            and invisible formatting characters are rejected). The byte cap
            applies to the NFC form. It is a label, not an address, and names
            are deliberately non-unique.
    SetRoleRequest:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum:
            - admin
            - member
          description: |
            The target member's new role. The owner role is not assignable here;
            it moves only through `PUT /rooms/{id}/owner`.
    SetOwnerRequest:
      type: object
      required:
        - user
      properties:
        user:
          type: string
          description: |
            The new owner's opaque public user code (`U…`). Must be a member of
            the room.
    SuccessResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: Always `true` on a 200 response.
    SendMessageSuccessResponse:
      type: object
      required:
        - success
        - timestamp
      properties:
        success:
          type: boolean
          description: Always `true` on a 200 response.
        timestamp:
          type: integer
          format: int64
          description: The server-assigned send time, in Unix milliseconds.
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      required:
        - code
        - status
        - message
      properties:
        code:
          type: integer
          description: The numeric error code paired with `status`.
        status:
          type: string
          description: |
            The canonical status string. This enum is the complete error
            taxonomy, not the subset any single endpoint returns; consult each
            operation's `responses` for the codes it can actually produce.
          enum:
            - AUTH_INVALID_TOKEN
            - AUTH_EXPIRED_TOKEN
            - AUTH_MISSING_TOKEN
            - AUTH_ACCOUNT_PENDING
            - ROOM_NOT_MEMBER
            - ROOM_ALREADY_MEMBER
            - ROOM_NOT_FOUND
            - ROOM_OWNER_CANNOT_LEAVE
            - ROOM_PERMISSION_DENIED
            - RATE_LIMIT_EXCEEDED
            - VERIFICATION_RATE_LIMITED
            - INVALID_REQUEST
            - MISSING_FIELD
            - PAYLOAD_TOO_LARGE
            - INVALID_EMAIL
            - WEAK_PASSWORD
            - INTERNAL_ERROR
            - SERVICE_UNAVAILABLE
            - EMAIL_ALREADY_REGISTERED
            - HANDLE_ALREADY_TAKEN
            - VERIFICATION_INVALID
        message:
          type: string
          description: A human-readable, client-safe explanation. Never leaks internal detail.
  responses:
    VerificationRateLimited:
      description: |
        The verification-PIN send budget is exhausted: a PIN was sent too
        recently (minimum interval) or the account has hit its resend cap. Wait
        before retrying.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: 3002
              status: VERIFICATION_RATE_LIMITED
              message: too many verification attempts; please wait and try again
    Unauthorized:
      description: |
        The bearer token is missing, malformed, expired, or otherwise invalid
        (`AUTH_MISSING_TOKEN`, `AUTH_EXPIRED_TOKEN`, or `AUTH_INVALID_TOKEN`).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: 1003
              status: AUTH_MISSING_TOKEN
              message: missing authorization header
    InvalidRoomId:
      description: The room code in the path was missing or malformed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: 4001
              status: INVALID_REQUEST
              message: room id is invalid
    RoomNotFound:
      description: |
        The room code is well-formed but matches no active room (the room does not
        exist or is no longer active).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: 2003
              status: ROOM_NOT_FOUND
              message: room not found
    ServiceUnavailable:
      description: A backend dependency was temporarily unreachable. The request may be retried.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: 5002
              status: SERVICE_UNAVAILABLE
              message: failed to reach user grain
    InternalError:
      description: An unexpected server-side failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: 5001
              status: INTERNAL_ERROR
              message: authentication unavailable
