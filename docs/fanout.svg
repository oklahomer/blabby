-serif" font-size="13" lengthAdjust="spacing" textLength="147.6592" x="77.1724" y="295.2935">PostMessageResponse</text></g><path d="M5,313.3594 L5,383.3594 L464,383.3594 L464,323.3594 L454,313.3594 L5,313.3594" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M454,313.3594 L454,323.3594 L464,323.3594 L454,313.3594" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="377.9141" x="41.0872" y="330.4263">The grain's mailbox is free the moment the job is queued.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="372.9502" x="41.0872" y="345.5591">The sender's own echo below therefore cannot deadlock:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="354.3516" x="41.0872" y="360.6919">it targets a User grain that is no longer blocked on the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="198.377" x="41.0872" y="375.8247">Room grain's reply. (ADR-015)</text><path d="M324.6353,395.8906 L401.2593,395.8906 L401.2593,403.0234 L391.2593,413.0234 L324.6353,413.0234 L324.6353,395.8906" fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="103.5313" style="stroke:#000000;stroke-width:1.5;" width="389.248" x="324.6353" y="395.8906"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="31.624" x="339.6353" y="408.9575">loop</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="700" lengthAdjust="spacing" textLength="253.0591" x="416.2593" y="408.1011">[for every member, the sender included]</text><g class="message" data-entity-1="part3" data-entity-2="part4" data-source-line="31" id="msg7"><polygon fill="#181818" points="540.4546,430.1563,550.4546,434.1563,540.4546,438.1563,544.4546,434.1563" style=