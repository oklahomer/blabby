<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="653px" preserveAspectRatio="none" style="width:829px;height:653px;background:#FFFFFF;" version="1.1" viewBox="0 0 829 653" width="829px" zoomAndPan="magnify"><?plantuml 1.2026.6?><defs/><g><g class="entity" data-qualified-name="pre" data-source-line="11" id="ent0001"><rect fill="#F1F1F1" height="68.8906" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="169.4131" x="434.64" y="118"/><line style="stroke:#181818;stroke-width:0.5;" x1="434.64" x2="604.0531" y1="144.2969" y2="144.2969"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="59.6777" x="489.5077" y="135.9951">Pre-auth</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="149.4131" x="439.64" y="162.292">awaits an auth frame</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="116.1221" x="439.64" y="178.5889">carrying the JWT</text></g><g class="entity" data-qualified-name="post" data-source-line="12" id="ent0002"><rect fill="#F1F1F1" height="68.8906" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="192.3203" x="340.19" y="302.28"/><line style="stroke:#181818;stroke-width:0.5;" x1="340.19" x2="532.5103" y1="328.5769" y2="328.5769"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="66.6572" x="403.0215" y="320.2751">Post-auth</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="165.874" x="345.19" y="346.572">writes room events and</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="172.3203" x="345.19" y="362.8689">heartbeats to the socket</text></g><g class="entity" data-qualified-name="closing" data-source-line="13" id="ent0003"><rect fill="#F1F1F1" height="68.8906" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="172.2637" x="433.21" y="456.56"/><line style="stroke:#181818;stroke-width:0.5;" x1="433.21" x2="605.4737" y1="482.8569" y2="482.8569"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="51.1738" x="493.7549" y="474.5551">Closing</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="143.9375" x="438.21" y="500.852">close frame queued;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="152.2637" x="438.21" y="517.1489">drops everything else</text></g><g class="start_entity" data-qualified-name=".start." data-source-line="15" id="ent0004"><ellipse cx="519.35" cy="16" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="end_entity" data-qualified-name=".end." data-source-line="19" id="ent0009"><ellipse cx="519.35" cy="628.45" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="519.35" cy="628.45" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN11" data-source-line="22" id="ent0012"><path d="M6,293.9 L6,379.5641 A0,0 0 0 0 6,379.5641 L304.6909,379.5641 A0,0 0 0 0 304.6909,379.5641 L304.6909,340.73 L339.76,336.73 L304.6909,332.73 L304.6909,303.9 L294.6909,293.9 L6,293.9 A0,0 0 0 0 6,293.9" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M294.6909,293.9 L294.6909,303.9 L304.6909,303.9 L294.6909,293.9" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.2993" x="12" y="310.9669">From every phase, transport tear-down</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="232.9526" x="12" y="326.0997">(peer close, pump failure) stops the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.8667" x="12" y="341.2325">actor directly. Once auth has registered</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.5386" x="12" y="356.3653">the PID, the User grain's watch observes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="277.6909" x="12" y="371.4981">the termination and evicts the connection.</text></g><!--link *start* to pre--><g class="link" data-entity-1="ent0004" data-entity-2="ent0001" data-link-type="dependency" data-source-line="15" id="lnk5"><path d="M519.35,26.25 C519.35,44.76 519.35,82.2 519.35,112.53" fill="none" id="*start*-to-pre" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="519.35,117.53,523.35,108.53,519.35,112.53,515.35,108.53,519.35,117.53" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.9233" x="520.35" y="69.0669">Started: pumps and heartbeat start,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="160.2466" x="558.1884" y="84.1997">auth deadline scheduled</text></g><!--link pre to post--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="16" id="lnk6"><path d="M473.32,187.1 C464.34,195.82 455.97,205.88 450.35,216.9 C436.88,243.26 434.0398,272.0901 434.1898,296.9101" fill="none" id="pre-to-post" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="434.22,301.91,438.1655,292.886,434.1898,296.9101,430.1657,292.9343,434.22,301.91" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="97.9126" x="464.5722" y="229.9669">auth accepted;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="92.4854" x="467.2858" y="245.0997">PID registered</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="124.3569" x="451.35" y="260.2325">with the User grain</text></g><!--link pre to closing--><g class="link" data-entity-1="ent0001" data-entity-2="ent0003" data-link-type="dependency" data-source-line="17" id="lnk7"><path d="M560.66,187.12 C568.68,195.89 575.95,205.98 580.35,216.9 C593.88,250.5 624.73,313.54 579.35,426.56 C575,437.39 571.1739,443.7327 563.2939,452.4927" fill="none" id="pre-to-closing" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="559.95,456.21,568.9428,452.1939,563.2939,452.4927,562.9951,446.8437,559.95,456.21" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.8535" x="616.753" y="333.7969">auth rejected, auth timeout,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208.9395" x="604.21" y="348.9297">protocol violation, pong timeout</text></g><!--link post to closing--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="18" id="lnk8"><path d="M454.77,371.52 C468.52,396.76 484.8359,426.7005 498.5859,451.9105" fill="none" id="post-to-closing" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="500.98,456.3,500.1822,446.4835,498.5859,451.9105,493.1589,450.3141,500.98,456.3" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="87.4897" x="483.81" y="422.6269">pong timeout</text></g><!--link closing to *end*--><g class="link" data-entity-1="ent0003" data-entity-2="ent0009" data-link-type="dependency" data-source-line="19" id="lnk10"><path d="M519.35,525.83 C519.35,555.92 519.35,593.04 519.35,612.21" fill="none" id="closing-to-*end*" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="519.35,617.21,523.35,608.21,519.35,612.21,515.35,608.21,519.35,617.21" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.6494" x="520.35" y="568.5169">write pump flushes the close</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="178.4771" x="524.9362" y="583.6497">frame, then the actor stops</text></g><?plantuml-src PLJRSjCm47ttL-pmafHndFTsXY4jbocqqEbbU20CLQHDB29BOYNRun_W0_X4leILdAGflDdhexDdpnvv0hTe5H8gY0wainPbrCxEGXGHGnMw3Qm6g3OwrkrgtZlQhethmzmROMFRc6feJ361gN8op1Vd5vNd8lpvzHiE5UOugU0ZeeVNJ4lf6Am4uIa8iABXteSwK_MkDGfSXqHQ8SGQmRNHjn7Msc32Wx0ALeHYorz5JB8xj4bs1VSEF66diMSguwGmPYY1MWkFZTWYA2qs99hm2DEGgBpcaHNGw0A1271nUGO1aS_VN2q-tJzSNts_l5wyVmlQPZNNp9Ead5J5X45thYN96jSGgOtrQSQii1QTTiJzWXTHrdoOiTf692lCNCZeQFxazz5ZjN4mlKM9kiCo3RDWrlCTNyaateNuh0OM-mlZWhQRVOsr5Nc5yEA6S2OO_YBDndJ0jlT2ny0sGle0QpO4brOAee4vyW0VljmV2BZV4GE_CKLFclC1v5m3cDnFT6ffQ-H5hb3mEmSgCGKdjnZtP3kTcKgEpyoMdd3K0JzRR56TBQqYvqCYfo7M2OScO55yVVaDPihrTlPgDyvT2W-gK-3i-Qm33Z8W9wjSsZofGg6CjYnArgXQWwf850UwSROC5LAYZrd8pUKR3iX6XvWkojBsV1doQ0-14yDnujqUqppDbPa8V_1cKPNZQzGDSg1PaYSNdNG6U6D6fDtplbrQm0Wfifx_MPzXzkKzBDcpMq_s0zQc3JMlAWdEFYzjDhfCbJ7HEOti5FjT5DRnIOFhc2AT51G0xsXSCmtWQn7IMH8sU4SH8bkTcpDkwf4ToLtANNUXJKjuChAdRWmR-obDx8iPAlXi-G9bSvZyo6g69ddiV_cFtvC0VRvMRiMr3iCEoiSQRRENEGVy9v1nD_lJ3IlujaEQyoy0?></g></svg>